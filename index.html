<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ledelses-BS | Sundhedsledelse på dansk</title>
  <meta name="description" content="Kuraterede ledelsescitater og kompetenceudviklingsværktøjer til den moderne sundhedsleder.">

  <!-- Open Graph -->
  <meta property="og:title" content="Ledelses-BS | Sundhedsledelse på dansk">
  <meta property="og:description" content="Kuraterede ledelsescitater og kompetenceudviklingsværktøjer til den moderne sundhedsleder.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://crowmaster1.github.io/ledelses-bs-app/">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Animate.css -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">

  <!-- Local CSS -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/quotes.css">
  <link rel="stylesheet" href="css/bingo.css">
  <link rel="stylesheet" href="css/favorites.css">
</head>
<body data-active-tab="citater">

  <header class="app-header">
    <div class="header-inner">
      <span class="app-title">Ledelses-BS</span>
      <span class="app-tagline">Sundhedsledelse på dansk</span>
    </div>
  </header>

  <main class="app-main">

    <!-- TAB: CITATER -->
    <section id="tab-citater" class="tab-panel" aria-label="Ledelsescitater">
      <div class="filter-section">
        <p class="filter-label">Ledelsesstil</p>
        <div class="filter-bar" id="style-filters" role="group" aria-label="Filtrer efter ledelsesstil"></div>
        <p class="filter-label">Tema</p>
        <div class="filter-bar" id="theme-filters" role="group" aria-label="Filtrer efter tema"></div>
      </div>
      <div class="quotes-list" id="quotes-list" aria-live="polite"></div>
    </section>

    <!-- TAB: BINGO -->
    <section id="tab-bingo" class="tab-panel" aria-label="Lingo Bingo" hidden>
      <div class="bingo-header">
        <h2 class="bingo-title">Ledelses Lingo Bingo</h2>
        <p class="bingo-subtitle">Et ledelsesfagligt kompetenceudviklingsværktøj til mødeoptimering</p>
      </div>
      <div class="bingo-grid" id="bingo-grid" role="grid" aria-label="Bingo kort"></div>
      <div class="bingo-controls">
        <button class="btn-secondary" id="new-card-btn">Nyt møde</button>
      </div>
      <div class="bingo-win-overlay" id="bingo-win-overlay" hidden>
        <div class="win-content">
          <p class="win-label">Mødemålet er nået.</p>
          <p class="win-sub">Din ledelsesfaglige kompetence er dokumenteret.</p>
          <button class="btn-primary" id="win-close-btn">Nyt møde</button>
        </div>
      </div>
    </section>

    <!-- TAB: FAVORITTER -->
    <section id="tab-favoritter" class="tab-panel" aria-label="Favoritter" hidden>
      <div class="favorites-list" id="favorites-list"></div>
    </section>

  </main>

  <!-- Bottom tab navigation -->
  <nav class="tab-bar" role="tablist">
    <button class="tab-btn active" data-tab="citater" role="tab" aria-selected="true" aria-controls="tab-citater">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
      </svg>
      <span class="tab-label">Citater</span>
    </button>
    <button class="tab-btn" data-tab="bingo" role="tab" aria-selected="false" aria-controls="tab-bingo">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      <span class="tab-label">Bingo</span>
    </button>
    <button class="tab-btn" data-tab="favoritter" role="tab" aria-selected="false" aria-controls="tab-favoritter">
      <svg class="tab-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
      </svg>
      <span class="tab-label">Favoritter</span>
    </button>
  </nav>

  <!-- Toast notification -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <!-- Data -->
  <script src="js/data/quotes.js"></script>
  <script src="js/data/bingo-words.js"></script>

  <!-- canvas-confetti CDN -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>

  <!-- Modules -->
  <script src="js/quotes.js"></script>
  <script src="js/bingo.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
